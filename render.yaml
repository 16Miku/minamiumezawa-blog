services:
  - type: static
    name: minamiumezawa-blog-archive
    runtime: static
    buildCommand: echo 'Static site already pre-built'
    publishPath: public
    headers:
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
